<!DOCTYPE html>
<html lang="de" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMEVAULT</title>
<script>if(/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)&&!location.search.includes('desktop'))location.replace('mobile.html');</script>
<script>try{var _t=localStorage.getItem('gamevault-theme');if(_t==='light'){document.documentElement.classList.remove('dark');document.documentElement.setAttribute('data-theme','light');}else if(_t==='dark'){document.documentElement.classList.add('dark');document.documentElement.removeAttribute('data-theme');}}catch(e){}</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="desktop.css">
<link rel="stylesheet" href="dist-dock/dock-widget.css">
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">⬡ GAMEVAULT</div>
  <div class="topbar-search-wrap">
    <div class="topbar-search-glow"></div>
    <div class="topbar-search-inner">
      <span class="si">⌕</span>
      <input class="topbar-search-input" id="SI" type="text" placeholder="Search games, platforms, moods… (Ctrl+K)" autocomplete="off" spellcheck="false">
      <span class="topbar-kbd">Ctrl+K</span>
    </div>
  </div>
  <div class="topbar-stats">
    <div class="tstat"><span class="tstat-num" id="sTotal">0</span> games</div>
    <div class="tstat"><span class="tstat-num" id="sMust">0</span> must play</div>
    <div class="tstat"><span class="tstat-num" id="sVita">0</span> vita ok</div>
    <div class="tstat">showing <span class="tstat-num" id="sCount">0</span></div>
  </div>
  <div id="dock-widget-root" style="flex-shrink:0;display:flex;align-items:center"></div>
  <a href="mobile.html" style="font-family:var(--fm);font-size:11px;color:var(--t2);
    border:1px solid var(--bdr);padding:5px 11px;border-radius:var(--rs);
    text-decoration:none;white-space:nowrap;background:var(--s2);flex-shrink:0"
    title="Mobile version">📱</a>
</div>

<!-- ACTIVE TAGS -->
<div class="atags" id="AT"></div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-inner">
      <div class="filter-section">
        <div class="filter-title">Genre</div>
        <div class="chips" id="GF">
          <button class="chip active" data-genre="all">All</button>
          <button class="chip" data-genre="open-world">🌍 Open World</button>
          <button class="chip" data-genre="action">⚔️ Action</button>
          <button class="chip" data-genre="shooter">🔫 Shooter</button>
          <button class="chip" data-genre="rpg">🧙 RPG</button>
          <button class="chip" data-genre="coop">🤝 Co-op</button>
          <button class="chip" data-genre="racing">🏎️ Racing</button>
          <button class="chip" data-genre="strategy">🏗️ Strategy</button>
          <button class="chip" data-genre="platformer">🕹️ Platformer</button>
          <button class="chip" data-genre="fighting">🥊 Fighting</button>
          <button class="chip" data-genre="sports">⚽ Sports</button>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Platform</div>
        <div class="chips" id="PF">
          <button class="chip p-chip active" data-plat="all"><svg class="pi" width="12" height="12" viewBox="0 0 12 12" fill="currentColor" opacity=".75"><rect x="0" y="0" width="5.2" height="5.2" rx="1"/><rect x="6.8" y="0" width="5.2" height="5.2" rx="1"/><rect x="0" y="6.8" width="5.2" height="5.2" rx="1"/><rect x="6.8" y="6.8" width="5.2" height="5.2" rx="1"/></svg> All</button>
          <button class="chip p-chip" data-plat="PC"><svg class="pi" width="16" height="13" viewBox="0 0 16 13" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x=".8" y=".8" width="14.4" height="9.5" rx="1.5"/><path d="M5.5 12.2h5M8 10.3v1.9"/></svg> PC</button>
          <button class="chip p-chip" data-plat="PS1"><svg class="pi" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="6.2" stroke-width="1.3"/><path d="M3,10 L3,4 L5,4 C6.5,4 6.5,7 5,7 L3,7 M11,4.5 C11,4 8,4 8,5.5 S11,7 11,8.5 C11,10 8,10 8,9.5" stroke-width="1.1"/></svg> PS1</button>
          <button class="chip p-chip" data-plat="PS2"><svg class="pi" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="6.2" stroke-width="1.3"/><path d="M3,10 L3,4 L5,4 C6.5,4 6.5,7 5,7 L3,7 M11,4.5 C11,4 8,4 8,5.5 S11,7 11,8.5 C11,10 8,10 8,9.5" stroke-width="1.1"/></svg> PS2</button>
          <button class="chip p-chip" data-plat="PS3"><svg class="pi" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="6.2" stroke-width="1.3"/><path d="M3,10 L3,4 L5,4 C6.5,4 6.5,7 5,7 L3,7 M11,4.5 C11,4 8,4 8,5.5 S11,7 11,8.5 C11,10 8,10 8,9.5" stroke-width="1.1"/></svg> PS3</button>
          <button class="chip p-chip" data-plat="PSP"><svg class="pi" width="19" height="11" viewBox="0 0 19 11" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y=".8" width="17.4" height="9.4" rx="2.5"/><rect x="4" y="2" width="11" height="7" rx=".7"/><circle cx="2.2" cy="5.5" r=".8" fill="currentColor" stroke="none"/><circle cx="16.8" cy="5.5" r=".8" fill="currentColor" stroke="none"/></svg> PSP</button>
          <button class="chip p-chip" data-plat="VITA"><svg class="pi" width="19" height="11" viewBox="0 0 19 11" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y="1.2" width="17.4" height="8.6" rx="4"/><rect x="3.5" y="2.2" width="12" height="6.6" rx=".6"/><circle cx="2" cy="4.2" r="1" fill="currentColor" stroke="none"/><circle cx="17" cy="6.8" r="1" fill="currentColor" stroke="none"/></svg> Vita</button>
          <button class="chip p-chip" data-plat="NDS"><svg class="pi" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y=".8" width="12.4" height="5.6" rx=".9"/><rect x=".8" y="7.6" width="12.4" height="5.6" rx=".9"/><line x1="2.5" y1="6.4" x2="11.5" y2="6.4" stroke-dasharray="1 1.5" stroke-width=".7"/></svg> DS</button>
          <button class="chip p-chip" data-plat="N3DS"><svg class="pi" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y=".8" width="12.4" height="5.6" rx=".9"/><circle cx="3" cy="2.5" r=".7" fill="currentColor" stroke="none"/><rect x=".8" y="7.6" width="12.4" height="5.6" rx=".9"/><line x1="2.5" y1="6.4" x2="11.5" y2="6.4" stroke-dasharray="1 1.5" stroke-width=".7"/></svg> 3DS</button>
          <button class="chip p-chip" data-plat="WII"><svg class="pi" width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y=".8" width="7.4" height="13.4" rx="2.8"/><circle cx="4.5" cy="4.2" r="1.5"/><rect x="2.8" y="7.3" width="3.4" height="2" rx=".7"/><circle cx="4.5" cy="11.5" r=".7" fill="currentColor" stroke="none"/></svg> Wii</button>
          <button class="chip p-chip" data-plat="WIIU"><svg class="pi" width="19" height="12" viewBox="0 0 19 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y="1.5" width="17.4" height="9" rx="2.5"/><rect x="5.5" y="2.7" width="8" height="5.5" rx=".8"/><circle cx="3" cy="5" r="1.2"/><circle cx="16" cy="7.5" r="1.2"/></svg> Wii U</button>
          <button class="chip p-chip" data-plat="NSW"><svg class="pi" width="19" height="13" viewBox="0 0 19 13" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="4.8" y=".8" width="9.4" height="11.4" rx="1.3"/><rect x=".8" y="1.8" width="4.4" height="9.4" rx="1.8"/><rect x="13.8" y="1.8" width="4.4" height="9.4" rx="1.8"/><circle cx="3" cy="4.5" r=".9" fill="currentColor" stroke="none"/><circle cx="16" cy="8" r=".9" fill="currentColor" stroke="none"/></svg> Switch</button>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Mode</div>
        <div class="chips" id="FF">
          <button class="chip" data-flag="must">⭐ Must</button>
          <button class="chip" data-flag="couch">🛋️ Couch</button>
          <button class="chip" data-flag="party">🎉 Party</button>
          <button class="chip" data-flag="coop">🤝 Co-op</button>
          <button class="chip" data-flag="online">🌐 Online</button>
          <button class="chip" data-flag="solo">Solo</button>
          <button class="chip" data-flag="owned">📦 Owned</button>
          <button class="chip" data-flag="classic">🕹️ Classic</button>
          <button class="chip" data-flag="vita">✅ Vita ok</button>
          <button class="chip" data-flag="vita_warn">⚠️ Vita±</button>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Sort</div>
        <div class="chips">
          <button class="sort-btn active" data-sort="default">Default</button>
          <button class="sort-btn" data-sort="year-new">Newest</button>
          <button class="sort-btn" data-sort="year-old">Oldest</button>
          <button class="sort-btn" data-sort="az">A–Z</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-toolbar">
      <span style="font-family:var(--fm);font-size:11px;color:var(--t2)">Click any card to inspect</span>
      <div class="view-row">
        <button class="view-btn active" id="GVB" title="Grid">⊞</button>
        <button class="view-btn" id="LVB" title="List">≡</button>
      </div>
    </div>
    <div class="grid-scroll">
      <div class="grid" id="GRID"></div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail closed" id="DP">
    <div class="detail-wrap">
      <button class="detail-close" id="DPC">✕</button>
      <div id="DPC2"></div>
    </div>
  </div>


<!-- MODAL -->
<div class="modal-overlay" id="MO">
  <div class="modal-box" id="MB">
    <button class="modal-close-btn" id="MCB">✕</button>
    <div class="modal-hero" id="MHero">
      <div class="modal-hero-ph" id="MHeroPh">🎮</div>
      <div class="modal-hero-grad"></div>
    </div>
    <div class="modal-screenshots" id="MShots"></div>
    <div class="modal-body" id="MBody"></div>
  </div>
</div>
</div>


<script type="module" src="app.js"></script>
<script src="dist-dock/dock-widget.iife.js"></script>
</body>
</html>
