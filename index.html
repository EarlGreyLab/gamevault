<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMEVAULT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',system-ui,sans-serif;background:#07090d;color:#e2e8f0;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(99,179,237,.07) 0%,transparent 60%),
  radial-gradient(ellipse 50% 40% at 80% 80%,rgba(159,122,234,.06) 0%,transparent 60%)}
.logo{font-size:clamp(40px,8vw,72px);font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(135deg,#e2e8f0 20%,#63b3ed 55%,#9f7aea 90%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px}
.sub{font-family:'Space Mono',monospace;font-size:13px;color:#4a5568;margin-bottom:48px;letter-spacing:.08em}
.sub span{color:#63b3ed}
.btns{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.btn{display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:24px 36px;border-radius:14px;text-decoration:none;
  border:1px solid rgba(99,179,237,.15);background:rgba(13,17,23,.8);
  transition:all .2s;cursor:pointer}
.btn:hover{border-color:rgba(99,179,237,.4);transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,.4)}
.btn-icon{font-size:36px}
.btn-label{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;
  text-transform:uppercase;color:#94a3b8}
.btn-desc{font-size:12px;color:#4a5568;text-align:center}
.stats{font-family:'Space Mono',monospace;font-size:11px;color:#4a5568;margin-top:40px}
.stats span{color:#63b3ed}
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@800&display=swap" rel="stylesheet">
</head>
<body>
<div class="logo">GAMEVAULT</div>
<div class="sub">All time picks &middot; <span>539 games</span> &middot; curated for Yun</div>
<div class="btns">
  <a class="btn" href="gamevault_desktop.html">
    <span class="btn-icon">🖥️</span>
    <span class="btn-label">Desktop</span>
    <span class="btn-desc">PC / Brave / Chrome<br>Sidebar layout</span>
  </a>
  <a class="btn" href="gamevault_mobile.html">
    <span class="btn-icon">📱</span>
    <span class="btn-label">Mobile</span>
    <span class="btn-desc">iPhone / Android<br>Bottom nav layout</span>
  </a>
</div>
<div class="stats"><span>539</span> games &nbsp;·&nbsp; <span>204</span> vita ok &nbsp;·&nbsp; 11 platforms</div>
<script>
// Auto-redirect based on device
if(/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)){
  window.location.replace('gamevault_mobile.html');
} else {
  window.location.replace('gamevault_desktop.html');
}
</script>
</body>
</html>
