<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GAMEVAULT</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">⬡ VAULT</div>
  <div class="search-wrap">
    <div class="search-glow"></div>
    <div class="search-inner">
      <span class="si">⌕</span>
      <input class="search-input" id="SI" type="text" placeholder="Search…" autocomplete="off" spellcheck="false">
    </div>
  </div>
  <a href="index.html?desktop=1" class="icon-btn" title="Desktop version">🖥️</a>
  <button class="icon-btn filter-btn-top" id="FBT">⊞</button>
</div>

<!-- COUNT + SORT -->
<div class="countbar">
  <div class="countbar-left"><span id="sCount">—</span> games · <span id="sVita">—</span> vita ok</div>
  <div class="sort-row">
    <button class="sort-btn active" data-sort="default">⭐</button>
    <button class="sort-btn" data-sort="year-new">↓ Year</button>
    <button class="sort-btn" data-sort="az">A–Z</button>
  </div>
</div>

<!-- ACTIVE TAGS ROW -->
<div class="atags-row" id="AT" style="display:none"></div>

<!-- SCROLL -->
<div class="scroll">
  <div class="cards" id="CARDS">
    <div class="loading"><div class="loading-spinner"></div></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" id="NB-all">
    <span class="nav-icon">🎮</span>
    <span class="nav-label">All</span>
  </button>
  <button class="nav-btn" id="NB-vita">
    <span class="nav-icon">📱</span>
    <span class="nav-label">Vita</span>
  </button>
  <button class="nav-btn" id="NB-must">
    <span class="nav-icon">⭐</span>
    <span class="nav-label">Must</span>
  </button>
  <button class="nav-btn" id="NB-coop">
    <span class="nav-icon">🤝</span>
    <span class="nav-label">Co-op</span>
  </button>
  <button class="nav-btn" id="NB-party">
    <span class="nav-icon">🎉</span>
    <span class="nav-label">Party</span>
  </button>
</nav>

<!-- FILTER SHEET -->
<div class="sheet-overlay" id="SO"></div>
<div class="sheet" id="FS">
  <div class="sheet-handle"></div>
  <div class="sheet-inner">
    <div class="sheet-section">
      <div class="sheet-title">Genre</div>
      <div class="chips" id="GF">
        <button class="chip active" data-genre="all">All</button>
        <button class="chip" data-genre="open-world">🌍 Open World</button>
        <button class="chip" data-genre="action">⚔️ Action</button>
        <button class="chip" data-genre="shooter">🔫 Shooter</button>
        <button class="chip" data-genre="rpg">🧙 RPG</button>
        <button class="chip" data-genre="coop">🤝 Co-op</button>
        <button class="chip" data-genre="racing">🏎️ Racing</button>
        <button class="chip" data-genre="strategy">🏗️ Strategy</button>
        <button class="chip" data-genre="platformer">🕹️ Platformer</button>
        <button class="chip" data-genre="fighting">🥊 Fighting</button>
        <button class="chip" data-genre="sports">⚽ Sports</button>
      </div>
    </div>
    <div class="sheet-section">
      <div class="sheet-title">Platform</div>
      <div class="chips" id="PF">
        <button class="chip p-chip active" data-plat="all"><svg class="pi" width="13" height="13" viewBox="0 0 12 12" fill="currentColor" opacity=".75"><rect x="0" y="0" width="5.2" height="5.2" rx="1"/><rect x="6.8" y="0" width="5.2" height="5.2" rx="1"/><rect x="0" y="6.8" width="5.2" height="5.2" rx="1"/><rect x="6.8" y="6.8" width="5.2" height="5.2" rx="1"/></svg> All</button>
        <button class="chip p-chip" data-plat="PC"><svg class="pi" width="18" height="15" viewBox="0 0 16 13" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x=".8" y=".8" width="14.4" height="9.5" rx="1.5"/><path d="M5.5 12.2h5M8 10.3v1.9"/></svg> PC</button>
        <button class="chip p-chip" data-plat="PS1"><svg class="pi" width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="6.2" stroke-width="1.3"/><path d="M3,10 L3,4 L5,4 C6.5,4 6.5,7 5,7 L3,7 M11,4.5 C11,4 8,4 8,5.5 S11,7 11,8.5 C11,10 8,10 8,9.5" stroke-width="1.1"/></svg> PS1</button>
        <button class="chip p-chip" data-plat="PS2"><svg class="pi" width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="6.2" stroke-width="1.3"/><path d="M3,10 L3,4 L5,4 C6.5,4 6.5,7 5,7 L3,7 M11,4.5 C11,4 8,4 8,5.5 S11,7 11,8.5 C11,10 8,10 8,9.5" stroke-width="1.1"/></svg> PS2</button>
        <button class="chip p-chip" data-plat="PS3"><svg class="pi" width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="6.2" stroke-width="1.3"/><path d="M3,10 L3,4 L5,4 C6.5,4 6.5,7 5,7 L3,7 M11,4.5 C11,4 8,4 8,5.5 S11,7 11,8.5 C11,10 8,10 8,9.5" stroke-width="1.1"/></svg> PS3</button>
        <button class="chip p-chip" data-plat="PSP"><svg class="pi" width="22" height="13" viewBox="0 0 19 11" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y=".8" width="17.4" height="9.4" rx="2.5"/><rect x="4" y="2" width="11" height="7" rx=".7"/><circle cx="2.2" cy="5.5" r=".8" fill="currentColor" stroke="none"/><circle cx="16.8" cy="5.5" r=".8" fill="currentColor" stroke="none"/></svg> PSP</button>
        <button class="chip p-chip" data-plat="VITA"><svg class="pi" width="22" height="13" viewBox="0 0 19 11" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y="1.2" width="17.4" height="8.6" rx="4"/><rect x="3.5" y="2.2" width="12" height="6.6" rx=".6"/><circle cx="2" cy="4.2" r="1" fill="currentColor" stroke="none"/><circle cx="17" cy="6.8" r="1" fill="currentColor" stroke="none"/></svg> PS Vita</button>
        <button class="chip p-chip" data-plat="NDS"><svg class="pi" width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y=".8" width="12.4" height="5.6" rx=".9"/><rect x=".8" y="7.6" width="12.4" height="5.6" rx=".9"/><line x1="2.5" y1="6.4" x2="11.5" y2="6.4" stroke-dasharray="1 1.5" stroke-width=".7"/></svg> DS</button>
        <button class="chip p-chip" data-plat="N3DS"><svg class="pi" width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y=".8" width="12.4" height="5.6" rx=".9"/><circle cx="3" cy="2.5" r=".7" fill="currentColor" stroke="none"/><rect x=".8" y="7.6" width="12.4" height="5.6" rx=".9"/><line x1="2.5" y1="6.4" x2="11.5" y2="6.4" stroke-dasharray="1 1.5" stroke-width=".7"/></svg> 3DS</button>
        <button class="chip p-chip" data-plat="WII"><svg class="pi" width="11" height="18" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y=".8" width="7.4" height="13.4" rx="2.8"/><circle cx="4.5" cy="4.2" r="1.5"/><rect x="2.8" y="7.3" width="3.4" height="2" rx=".7"/><circle cx="4.5" cy="11.5" r=".7" fill="currentColor" stroke="none"/></svg> Wii</button>
        <button class="chip p-chip" data-plat="WIIU"><svg class="pi" width="22" height="14" viewBox="0 0 19 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x=".8" y="1.5" width="17.4" height="9" rx="2.5"/><rect x="5.5" y="2.7" width="8" height="5.5" rx=".8"/><circle cx="3" cy="5" r="1.2"/><circle cx="16" cy="7.5" r="1.2"/></svg> Wii U</button>
        <button class="chip p-chip" data-plat="NSW"><svg class="pi" width="22" height="15" viewBox="0 0 19 13" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="4.8" y=".8" width="9.4" height="11.4" rx="1.3"/><rect x=".8" y="1.8" width="4.4" height="9.4" rx="1.8"/><rect x="13.8" y="1.8" width="4.4" height="9.4" rx="1.8"/><circle cx="3" cy="4.5" r=".9" fill="currentColor" stroke="none"/><circle cx="16" cy="8" r=".9" fill="currentColor" stroke="none"/></svg> Switch</button>
      </div>
    </div>
    <div class="sheet-section">
      <div class="sheet-title">Mode &amp; Tags</div>
      <div class="chips" id="FF">
        <button class="chip" data-flag="owned">📦 Owned</button>
        <button class="chip" data-flag="classic">🕹️ Classic</button>
        <button class="chip" data-flag="couch">🛋️ Couch</button>
        <button class="chip" data-flag="online">🌐 Online</button>
        <button class="chip" data-flag="solo">Solo</button>
        <button class="chip" data-flag="vita_warn">⚠️ Vita±</button>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="sheet-btn sheet-btn-clear" id="SBC">Clear All</button>
      <button class="sheet-btn sheet-btn-apply" id="SBA">Apply</button>
    </div>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="detail-overlay" id="DO"></div>
<div class="detail-sheet" id="DS">
  <div class="ds-handle"></div>
  <div id="DSC"></div>
</div>

<script>
const _platC = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const PC_PLAT={
  "PS1": {get c(){return _platC('--plat-ps');},   l:"PS1"},
  "PS2": {get c(){return _platC('--plat-ps');},   l:"PS2"},
  "PS3": {get c(){return _platC('--plat-ps');},   l:"PS3"},
  "PSP": {get c(){return _platC('--plat-ps');},   l:"PSP"},
  "VITA":{get c(){return _platC('--plat-vita');}, l:"Vita"},
  "NDS": {get c(){return _platC('--plat-ds');},   l:"DS"},
  "N3DS":{get c(){return _platC('--plat-ds');},   l:"3DS"},
  "WII": {get c(){return _platC('--plat-wii');},  l:"Wii"},
  "WIIU":{get c(){return _platC('--plat-wii');},  l:"Wii U"},
  "NSW": {get c(){return _platC('--plat-switch');},l:"Switch"},
  "PC":  {get c(){return _platC('--plat-pc');},   l:"PC"},
};
const GE={"open-world":"&#127757;","action":"&#9876;","shooter":"&#128299;","rpg":"&#129497;",
  "coop":"&#129309;","racing":"&#127950;","strategy":"&#127959;","platformer":"&#128377;",
  "fighting":"&#129354;","sports":"&#9917;"};

let IMG={},GAMES=[],G=[],dataReady=false;
let curG='all',curP='all',aF=new Set(),curS='default',navMode='all';

function getImg(g){const u=IMG[g.t];return(u&&u.length>0)?u:null;}

function buildCard(g,i){
  const img=getImg(g);const isMust=g.f.includes('must');
  const c=document.createElement('div');
  c.className='card'+(isMust?' must':'');
  c.style.animationDelay=Math.min(i*.015,.4)+'s';
  const plat=g.p||'PC';const pi=PC_PLAT[plat]||PC_PLAT.PC;
  const ge=GE[g.g]||'🎮';
  const vc=g.vita==='yes'?'ct-vy':g.vita==='warn'?'ct-vw':'ct-vn';
  const vt=g.vita==='yes'?'Vita✓':g.vita==='warn'?'Vita±':'—';
  const fd=[['must','ct-must','Must'],['couch','ct-couch','Couch'],
    ['party','ct-party','Party'],['coop','ct-coop','Co-op'],['solo','ct-solo','Solo']];
  const ft=fd.filter(([k])=>g.f.includes(k)).slice(0,3)
    .map(([,cl,l])=>`<span class="ct ${cl}">${l}</span>`).join('');
  const imgH=img
    ?`<div class="ciw"><img src="${img}" alt="${g.t}" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling&&(this.nextElementSibling.style.display='flex')">
       <div class="cip" style="display:none">${ge}</div>
       <span class="yr">${g.y}</span><span class="pb" style="background:${pi.c}">${pi.l}</span></div>`
    :`<div class="ciw"><div class="cip">${ge}</div>
       <span class="yr">${g.y}</span><span class="pb" style="background:${pi.c}">${pi.l}</span></div>`;
  c.innerHTML=`${imgH}<div class="cbody">
    <div class="ctitle">${g.t}</div>
    <div class="cdesc">${g.d}</div>
    <div class="ctags"><span class="ct ct-genre">${g.g}</span>${ft}<span class="ct ${vc}">${vt}</span></div>
  </div>`;
  c.addEventListener('click',()=>openDetail(g));
  return c;
}

function getSorted(){
  if(!dataReady)return[];
  const q=(document.getElementById('SI').value||'').toLowerCase();
  return G.filter(g=>{
    if(curG!=='all'&&g.g!==curG)return false;
    if(curP!=='all'&&(g.p||'PC')!==curP)return false;
    if(q&&!g.t.toLowerCase().includes(q)&&!g.d.toLowerCase().includes(q)&&
       !(g.p||'PC').toLowerCase().includes(q))return false;
    for(const fl of aF){
      if(fl==='vita'){if(g.vita!=='yes')return false;}
      else if(fl==='vita_warn'){if(g.vita!=='warn'&&g.vita!=='yes')return false;}
      else if(!g.f.includes(fl))return false;
    }
    if(navMode==='vita'&&g.vita!=='yes')return false;
    if(navMode==='must'&&!g.f.includes('must'))return false;
    if(navMode==='coop'&&!g.f.includes('coop')&&!g.f.includes('couch'))return false;
    if(navMode==='party'&&!g.f.includes('party'))return false;
    return true;
  }).sort((a,b)=>{
    if(curS==='year-new')return b.y-a.y;
    if(curS==='az')return a.t.localeCompare(b.t);
    return(b.f.includes('must')?1:0)-(a.f.includes('must')?1:0);
  });
}

const FL={must:'Must',owned:'Owned',classic:'Classic',couch:'Couch',
  party:'Party',coop:'Co-op',online:'Online',solo:'Solo',vita:'Vita ok',vita_warn:'Vita±'};
const GL={'open-world':'Open World',action:'Action',shooter:'Shooter',rpg:'RPG',
  coop:'Co-op',racing:'Racing',strategy:'Strategy',platformer:'Platformer',
  fighting:'Fighting',sports:'Sports'};
const PL={PC:'PC',PS1:'PS1',PS2:'PS2',PS3:'PS3',PSP:'PSP',VITA:'Vita',
  NDS:'DS',N3DS:'3DS',WII:'Wii',WIIU:'Wii U',NSW:'Switch'};

function renderATags(){
  const el=document.getElementById('AT');el.innerHTML='';
  const add=(label,rm)=>{
    const t=document.createElement('div');t.className='atag';
    t.innerHTML=`${label} <span style="opacity:.55">✕</span>`;
    t.addEventListener('click',()=>{rm();render();});
    el.appendChild(t);
  };
  if(curG!=='all')add(GL[curG]||curG,()=>{
    curG='all';
    document.querySelectorAll('#GF .chip').forEach(b=>b.classList.remove('active'));
    document.querySelector('#GF [data-genre="all"]').classList.add('active');
  });
  if(curP!=='all')add(PL[curP]||curP,()=>{
    curP='all';
    document.querySelectorAll('#PF .chip').forEach(b=>b.classList.remove('active'));
    document.querySelector('#PF [data-plat="all"]').classList.add('active');
  });
  aF.forEach(fl=>add(FL[fl]||fl,()=>{
    aF.delete(fl);
    document.querySelector(`#FF [data-flag="${fl}"]`)?.classList.remove('active');
  }));
  el.style.display=el.children.length?'flex':'none';
}

function render(){
  if(!dataReady)return;
  const cards=document.getElementById('CARDS');
  const list=getSorted();
  cards.innerHTML='';
  if(!list.length)cards.innerHTML='<div class="empty"><span>🔍</span>No games match.</div>';
  else list.forEach((g,i)=>cards.appendChild(buildCard(g,i)));
  document.getElementById('sCount').textContent=list.length;
  document.getElementById('FBT').classList.toggle('has-filters',curG!=='all'||curP!=='all'||aF.size>0);
  renderATags();
}

function openDetail(g){
  const img=getImg(g);const plat=g.p||'PC';const pi=PC_PLAT[plat]||PC_PLAT.PC;
  const ge=GE[g.g]||'🎮';
  const vc=g.vita==='yes'?'ct-vy':g.vita==='warn'?'ct-vw':'ct-vn';
  const vt=g.vita==='yes'?'✅ Fully playable on Vita via Moonlight'
    :g.vita==='warn'?'⚠️ Vita playable with limits — no LB/RB/L3/R3'
    :'❌ Not recommended on Vita (requires L2/R2/L3/R3)';
  const vbg=g.vita==='yes'?'rgba(104,211,145,.08)'
    :g.vita==='warn'?'rgba(246,224,94,.06)':'rgba(252,129,129,.06)';
  const fd=[['must','ct-must','Must Play'],['couch','ct-couch','Couch Co-op'],
    ['party','ct-party','Party'],['coop','ct-coop','Co-op'],['online','ct-online','Online'],
    ['solo','ct-solo','Solo'],['owned','ct-owned','Owned'],['classic','ct-classic','Classic']];
  const ft=fd.filter(([k])=>g.f.includes(k))
    .map(([,cl,l])=>`<span class="ct ${cl}">${l}</span>`).join('');
  const imgH=img
    ?`<img class="ds-img" src="${img}" alt="${g.t}" referrerpolicy="no-referrer" onerror="this.style.display='none'">`
    :`<div class="ds-img-ph">${ge}</div>`;
  document.getElementById('DSC').innerHTML=`${imgH}
    <div class="ds-body">
      <div>
        <div class="ds-title">${g.t}</div>
        <div class="ds-meta">${g.y} · ${g.g} · <span style="color:${pi.c}">${pi.l}</span></div>
      </div>
      <div class="ds-desc">${g.d}</div>
      <div class="ds-tags"><span class="ct ct-genre">${g.g}</span>${ft}</div>
      <div class="ds-vita" style="background:${vbg}">
        <span class="ct ${vc}" style="background:none;border:none;padding:0">${vt}</span>
      </div>
    </div>`;
  document.getElementById('DO').classList.add('open');
  document.getElementById('DS').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('DO').classList.remove('open');
  document.getElementById('DS').classList.remove('open');
  document.body.style.overflow='';
}
function openSheet(){
  document.getElementById('SO').classList.add('open');
  document.getElementById('FS').classList.add('open');
}
function closeSheet(){
  document.getElementById('SO').classList.remove('open');
  document.getElementById('FS').classList.remove('open');
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('SI').addEventListener('input',render);
document.getElementById('FBT').addEventListener('click',openSheet);
document.getElementById('SO').addEventListener('click',closeSheet);
document.getElementById('DO').addEventListener('click',closeDetail);
document.getElementById('SBA').addEventListener('click',()=>{closeSheet();render();});
document.getElementById('SBC').addEventListener('click',()=>{
  curG='all';curP='all';aF.clear();
  document.querySelectorAll('#GF .chip').forEach(b=>b.classList.remove('active'));
  document.querySelector('#GF [data-genre="all"]').classList.add('active');
  document.querySelectorAll('#PF .chip').forEach(b=>b.classList.remove('active'));
  document.querySelector('#PF [data-plat="all"]').classList.add('active');
  document.querySelectorAll('#FF .chip').forEach(b=>b.classList.remove('active'));
  closeSheet();render();
});

document.querySelectorAll('#GF .chip').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#GF .chip').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');curG=b.dataset.genre;
}));
document.querySelectorAll('#PF .chip').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#PF .chip').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');curP=b.dataset.plat;
}));
document.querySelectorAll('#FF .chip').forEach(b=>b.addEventListener('click',()=>{
  const f=b.dataset.flag;
  if(aF.has(f)){aF.delete(f);b.classList.remove('active');}
  else{aF.add(f);b.classList.add('active');}
}));
document.querySelectorAll('.sort-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.sort-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');curS=b.dataset.sort;render();
}));
['all','vita','must','coop','party'].forEach(mode=>{
  document.getElementById('NB-'+mode).addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('NB-'+mode).classList.add('active');
    navMode=mode;render();
  });
});

// Swipe detail sheet down to close
let _ty=0;
document.getElementById('DS').addEventListener('touchstart',e=>{_ty=e.touches[0].clientY;},{passive:true});
document.getElementById('DS').addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientY-_ty>60&&document.getElementById('DS').scrollTop===0)closeDetail();
},{passive:true});

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeSheet();}});

// ── BOOTSTRAP ─────────────────────────────────────────────────────────────────
async function bootstrap(){
  try{
    const res=await fetch('games.json',{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(!data.IMG||!data.GAMES)throw new Error('Invalid data format');
    IMG=data.IMG;
    GAMES=data.GAMES.filter(Boolean);
    const seen=new Set();
    G=GAMES.filter(g=>{if(seen.has(g.t))return false;seen.add(g.t);return true;});
    dataReady=true;
    document.getElementById('sVita').textContent=G.filter(g=>g.vita==='yes').length;
    render();
  }catch(e){
    const hint=window.location.protocol==='file:'
      ?'You opened this via <code>file://</code>. Run a local server instead:<br><code>npx serve .</code>'
      :'Check that <code>games.json</code> exists in the same directory.';
    document.getElementById('CARDS').innerHTML=
      `<div class="empty"><span>⚠️</span><strong>Could not load game data.</strong><br><br>${hint}</div>`;
    document.getElementById('sCount').textContent='0';
    document.getElementById('sVita').textContent='0';
  }
}

bootstrap();
</script>
</body>
</html>
