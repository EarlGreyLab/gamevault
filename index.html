<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMEVAULT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000;--s1:#080808;--s2:#0f0f0f;--s3:#161616;--s4:#1e1e1e;
  --acc:#7c9fff;--acc2:#a78bfa;--grn:#6ee7b7;--ylw:#fde68a;
  --org:#fbbf24;--pnk:#f9a8d4;--tel:#67e8f9;--red:#fca5a5;
  --t1:#f5f5f5;--t2:#a3a3a3;--t3:#525252;--t4:#262626;
  --bdr:rgba(255,255,255,.07);--bdrg:rgba(124,159,255,.3);
  --fd:'DM Sans',system-ui,sans-serif;--fm:'DM Mono',monospace;
  --r:10px;--rs:6px;
  --sidebar:280px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fd);background:#000;color:var(--t1);display:flex;flex-direction:column}

/* BG */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 40% at 15% 10%,rgba(124,159,255,.04) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 85% 85%,rgba(167,139,250,.03) 0%,transparent 60%)}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.018;
  background-image:linear-gradient(rgba(99,179,237,1) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,237,1) 1px,transparent 1px);
  background-size:60px 60px}

/* TOPBAR */
.topbar{position:relative;z-index:10;display:flex;align-items:center;gap:16px;
  padding:0 24px;height:52px;
  background:rgba(0,0,0,.92);border-bottom:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(12px);flex-shrink:0}
.topbar-logo{font-family:var(--fm);font-size:14px;font-weight:800;letter-spacing:-.01em;
  background:linear-gradient(135deg,#e2e8f0,#63b3ed,#9f7aea);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap}
.topbar-search-wrap{flex:1;position:relative;max-width:480px}
.topbar-search-glow{position:absolute;inset:-1px;border-radius:calc(var(--rs)+1px);
  background:linear-gradient(135deg,var(--acc),var(--acc2));opacity:0;transition:opacity .3s}
.topbar-search-wrap:focus-within .topbar-search-glow{opacity:.4}
.topbar-search-inner{position:relative;z-index:1;display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);padding:7px 12px;
  transition:border-color .2s}
.topbar-search-wrap:focus-within .topbar-search-inner{border-color:var(--bdrg)}
.si{font-size:14px;opacity:.4}
.topbar-search-input{background:none;border:none;outline:none;font-family:var(--fd);
  font-size:13px;color:var(--t1);width:100%}
.topbar-search-input::placeholder{color:var(--t3)}
.topbar-kbd{font-family:var(--fm);font-size:10px;color:var(--t3);background:var(--s3);
  border:1px solid var(--bdr);padding:1px 5px;border-radius:3px}
.topbar-stats{display:flex;gap:20px;margin-left:auto}
.tstat{display:flex;align-items:center;gap:6px;font-family:var(--fm);font-size:11px;color:var(--t3)}
.tstat-num{color:var(--acc);font-weight:700}
.topbar-count{font-family:var(--fm);font-size:11px;color:var(--t3);white-space:nowrap}
.topbar-count span{color:var(--acc)}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{width:var(--sidebar);flex-shrink:0;
  background:rgba(0,0,0,.85);border-right:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;overflow:hidden}
.sidebar-inner{flex:1;overflow-y:auto;padding:16px 14px 24px}
.sidebar-inner::-webkit-scrollbar{width:3px}
.sidebar-inner::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}

.filter-section{margin-bottom:18px}
.filter-title{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--t4);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.filter-title::after{content:'';flex:1;height:1px;background:var(--bdr)}
.chips{display:flex;flex-wrap:wrap;gap:4px}

.chip{display:inline-flex;align-items:center;gap:4px;font-family:var(--fd);font-size:11px;
  font-weight:600;padding:4px 10px;border-radius:999px;border:1px solid var(--bdr);
  cursor:pointer;transition:all .12s;white-space:nowrap;background:var(--s2);color:var(--t2);
  user-select:none;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--bdrg);color:var(--t1)}
.chip.active{color:var(--bg);border-color:transparent;box-shadow:0 2px 10px rgba(99,179,237,.15)}
.chip[data-genre].active{background:var(--acc);color:#000}
.chip[data-flag="must"].active{background:var(--red)}
.chip[data-flag="owned"].active{background:var(--t2);color:var(--bg)}
.chip[data-flag="classic"].active{background:var(--org);color:var(--bg)}
.chip[data-flag="couch"].active{background:var(--acc2)}
.chip[data-flag="party"].active{background:var(--pnk);color:var(--bg)}
.chip[data-flag="coop"].active{background:var(--grn);color:var(--bg)}
.chip[data-flag="online"].active{background:var(--acc);color:var(--bg)}
.chip[data-flag="solo"].active{background:var(--tel);color:var(--bg)}
.chip[data-flag="vita"].active{background:var(--grn);color:var(--bg)}
.chip[data-flag="vita_warn"].active{background:var(--ylw);color:var(--bg)}
.chip[data-plat="PC"].active{background:#63b3ed;color:#080c10}
.chip[data-plat="PS1"].active,.chip[data-plat="PS2"].active,.chip[data-plat="PS3"].active,
.chip[data-plat="PSP"].active,.chip[data-plat="VITA"].active{background:#003791;color:#fff}
.chip[data-plat="NDS"].active,.chip[data-plat="N3DS"].active,.chip[data-plat="WII"].active,
.chip[data-plat="WIIU"].active,.chip[data-plat="NSW"].active{background:#C8102E;color:#fff}

/* ACTIVE FILTER TAGS */
.atags{display:flex;flex-wrap:wrap;gap:4px;padding:8px 14px;
  border-bottom:1px solid var(--bdr);min-height:0;background:rgba(13,17,23,.6)}
.atag{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:10px;
  padding:2px 8px 2px 10px;border-radius:999px;background:rgba(99,179,237,.1);
  color:var(--acc);border:1px solid rgba(99,179,237,.2);cursor:pointer;transition:all .12s}
.atag:hover{background:rgba(99,179,237,.18)}
.atag .x{opacity:.6}

/* MAIN CONTENT */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-toolbar{display:flex;align-items:center;justify-content:space-between;
  padding:8px 20px;border-bottom:1px solid var(--bdr);flex-shrink:0;
  background:rgba(0,0,0,.5)}
.sort-row{display:flex;align-items:center;gap:6px}
.sort-lbl{font-family:var(--fm);font-size:10px;color:var(--t3)}
.sort-btn{font-family:var(--fm);font-size:10px;padding:3px 9px;
  border-radius:var(--rs);border:1px solid var(--bdr);
  background:none;color:var(--t3);cursor:pointer;transition:all .12s}
.sort-btn.active,.sort-btn:hover{color:var(--acc);border-color:var(--bdrg)}
.view-row{display:flex;gap:4px}
.view-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--rs);border:1px solid var(--bdr);background:none;
  color:var(--t3);cursor:pointer;font-size:12px;transition:all .12s}
.view-btn.active,.view-btn:hover{color:var(--acc);border-color:var(--bdrg)}

/* GRID */
.grid-scroll{flex:1;overflow-y:auto;padding:16px 20px}
.grid-scroll::-webkit-scrollbar{width:4px}
.grid-scroll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.grid.list-v{grid-template-columns:1fr}

/* CARD */
.card{background:#0a0a0a;border:1px solid rgba(255,255,255,.07);border-radius:var(--r);
  overflow:hidden;display:flex;flex-direction:column;
  transition:transform .18s,border-color .18s,box-shadow .18s;
  cursor:pointer;position:relative;animation:fu .3s both}
.card:hover{transform:translateY(-2px);border-color:var(--bdrg);
  box-shadow:0 8px 28px rgba(0,0,0,.45),0 0 0 1px rgba(99,179,237,.07)}
.card.must{border-color:rgba(252,129,129,.22)}
.card.must::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--red),transparent)}
.card.must:hover{border-color:rgba(252,129,129,.5)}
.card.hidden{display:none!important}
/* List mode */
.grid.list-v .card{flex-direction:row;max-height:90px}
.grid.list-v .ciw{width:150px;flex-shrink:0}
.grid.list-v .ciw img{width:150px;height:90px;aspect-ratio:unset}
.grid.list-v .cip{width:150px;height:90px;aspect-ratio:unset}
.grid.list-v .cbody{flex-direction:row;align-items:center;padding:8px 12px;gap:10px;overflow:hidden}
.grid.list-v .cdesc{display:none}
.grid.list-v .ctags{margin-top:0;padding-top:0}
/* Image */
.ciw{position:relative;overflow:hidden}
.ciw img{width:100%;aspect-ratio:460/215;object-fit:cover;display:block;
  transition:transform .35s,filter .25s;filter:brightness(.82) saturate(.85)}
.card:hover .ciw img{transform:scale(1.04);filter:brightness(1) saturate(1.1)}
.cip{width:100%;aspect-ratio:460/215;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--s3),var(--s2));font-size:28px;opacity:.45}
.yr{position:absolute;bottom:6px;right:6px;font-family:var(--fm);font-size:9px;
  background:rgba(7,9,13,.8);backdrop-filter:blur(4px);color:var(--t2);
  padding:1px 7px;border-radius:999px;border:1px solid var(--bdr)}
.pb{position:absolute;bottom:6px;left:6px;font-family:var(--fm);font-size:9px;font-weight:700;
  color:#fff;padding:1px 7px;border-radius:999px;letter-spacing:.04em;opacity:.9}
/* Body */
.cbody{padding:10px 12px 12px;display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
.ctitle{font-size:12px;font-weight:700;line-height:1.25;color:#f5f5f5;letter-spacing:-.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cdesc{font-size:11px;color:#737373;line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ctags{display:flex;flex-wrap:wrap;gap:3px;margin-top:auto;padding-top:2px}
.ct{font-size:9px;padding:1px 6px;border-radius:999px;font-weight:600;white-space:nowrap;font-family:var(--fm)}
.ct-must{background:rgba(252,129,129,.12);color:var(--red);border:1px solid rgba(252,129,129,.2)}
.ct-owned{background:rgba(148,163,184,.1);color:var(--t2);border:1px solid rgba(148,163,184,.15)}
.ct-classic{background:rgba(246,173,85,.1);color:var(--org);border:1px solid rgba(246,173,85,.2)}
.ct-couch{background:rgba(159,122,234,.12);color:var(--acc2);border:1px solid rgba(159,122,234,.2)}
.ct-party{background:rgba(246,135,179,.1);color:var(--pnk);border:1px solid rgba(246,135,179,.2)}
.ct-coop{background:rgba(104,211,145,.1);color:var(--grn);border:1px solid rgba(104,211,145,.2)}
.ct-online{background:rgba(99,179,237,.1);color:var(--acc);border:1px solid rgba(99,179,237,.2)}
.ct-solo{background:rgba(79,209,197,.1);color:var(--tel);border:1px solid rgba(79,209,197,.2)}
.ct-vy{background:rgba(104,211,145,.12);color:var(--grn);border:1px solid rgba(104,211,145,.25)}
.ct-vw{background:rgba(246,224,94,.1);color:var(--ylw);border:1px solid rgba(246,224,94,.2)}
.ct-vn{background:rgba(252,129,129,.07);color:rgba(252,129,129,.5);border:1px solid rgba(252,129,129,.1)}
.ct-genre{background:rgba(99,179,237,.06);color:var(--t3);border:1px solid rgba(99,179,237,.08);
  text-transform:uppercase;letter-spacing:.06em}

/* DETAIL PANEL */
.detail{width:380px;flex-shrink:0;display:flex;flex-direction:column;
  background:rgba(0,0,0,.92);border-left:1px solid rgba(255,255,255,.06);
  overflow-y:auto;transition:width .3s}
.detail.closed{width:0;border-left:none;overflow:hidden}
.detail::-webkit-scrollbar{width:3px}
.detail::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
.detail-img{width:100%;aspect-ratio:460/215;object-fit:cover;display:block;filter:brightness(.78)}
.detail-img-ph{width:100%;aspect-ratio:460/215;display:flex;align-items:center;
  justify-content:center;background:var(--s3);font-size:52px;opacity:.35}
.detail-body{padding:16px 18px 24px;display:flex;flex-direction:column;gap:10px}
.detail-close{position:absolute;top:60px;right:8px;width:28px;height:28px;border-radius:50%;
  background:rgba(7,9,13,.75);backdrop-filter:blur(4px);border:1px solid var(--bdr);
  color:var(--t2);font-size:13px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .12s;z-index:2}
.detail-close:hover{background:var(--s3);color:var(--t1)}
.detail-wrap{position:relative}
.dtitle{font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1.2}
.dmeta{font-family:var(--fm);font-size:10px;color:var(--t3)}
.ddesc{font-size:13px;color:var(--t2);line-height:1.6}
.dtags{display:flex;flex-wrap:wrap;gap:4px}
.dvita{font-family:var(--fm);font-size:11px;padding:7px 12px;border-radius:var(--rs);
  border:1px solid var(--bdr);display:flex;align-items:flex-start;gap:7px;line-height:1.4}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:80px 0;
  font-family:var(--fm);color:var(--t3);font-size:12px}
.empty span{font-size:36px;display:block;margin-bottom:12px;opacity:.3}

/* SCROLLBAR GLOBAL */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:99px}

@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">⬡ GAMEVAULT</div>
  <div class="topbar-search-wrap">
    <div class="topbar-search-glow"></div>
    <div class="topbar-search-inner">
      <span class="si">⌕</span>
      <input class="topbar-search-input" id="SI" type="text" placeholder="Search games, platforms, moods… (Ctrl+K)" autocomplete="off" spellcheck="false">
      <span class="topbar-kbd">Ctrl+K</span>
    </div>
  </div>
  <div class="topbar-stats">
    <div class="tstat"><span class="tstat-num" id="sTotal">0</span> games</div>
    <div class="tstat"><span class="tstat-num" id="sMust">0</span> must play</div>
    <div class="tstat"><span class="tstat-num" id="sVita">0</span> vita ok</div>
    <div class="tstat">showing <span class="tstat-num" id="sCount">0</span></div>
  </div>
  <a href="gamevault_mobile.html" style="font-family:var(--fm);font-size:10px;color:var(--t3);
    border:1px solid var(--bdr);padding:4px 10px;border-radius:var(--rs);
    text-decoration:none;white-space:nowrap;background:var(--s2);flex-shrink:0"
    title="Mobile version">📱</a>
</div>

<!-- ACTIVE TAGS -->
<div class="atags" id="AT"></div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-inner">
      <div class="filter-section">
        <div class="filter-title">Genre</div>
        <div class="chips" id="GF">
          <button class="chip active" data-genre="all">All</button>
          <button class="chip" data-genre="open-world">🌍 Open World</button>
          <button class="chip" data-genre="action">⚔️ Action</button>
          <button class="chip" data-genre="shooter">🔫 Shooter</button>
          <button class="chip" data-genre="rpg">🧙 RPG</button>
          <button class="chip" data-genre="coop">🤝 Co-op</button>
          <button class="chip" data-genre="racing">🏎️ Racing</button>
          <button class="chip" data-genre="strategy">🏗️ Strategy</button>
          <button class="chip" data-genre="platformer">🕹️ Platformer</button>
          <button class="chip" data-genre="fighting">🥊 Fighting</button>
          <button class="chip" data-genre="sports">⚽ Sports</button>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Platform</div>
        <div class="chips" id="PF">
          <button class="chip p-chip active" data-plat="all">All</button>
          <button class="chip p-chip" data-plat="PC">💻 PC</button>
          <button class="chip p-chip" data-plat="PS1">PS1</button>
          <button class="chip p-chip" data-plat="PS2">PS2</button>
          <button class="chip p-chip" data-plat="PS3">PS3</button>
          <button class="chip p-chip" data-plat="PSP">PSP</button>
          <button class="chip p-chip" data-plat="VITA">Vita</button>
          <button class="chip p-chip" data-plat="NDS">DS</button>
          <button class="chip p-chip" data-plat="N3DS">3DS</button>
          <button class="chip p-chip" data-plat="WII">Wii</button>
          <button class="chip p-chip" data-plat="WIIU">Wii U</button>
          <button class="chip p-chip" data-plat="NSW">Switch</button>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Mode</div>
        <div class="chips" id="FF">
          <button class="chip" data-flag="must">⭐ Must</button>
          <button class="chip" data-flag="couch">🛋️ Couch</button>
          <button class="chip" data-flag="party">🎉 Party</button>
          <button class="chip" data-flag="coop">🤝 Co-op</button>
          <button class="chip" data-flag="online">🌐 Online</button>
          <button class="chip" data-flag="solo">Solo</button>
          <button class="chip" data-flag="owned">📦 Owned</button>
          <button class="chip" data-flag="classic">🕹️ Classic</button>
          <button class="chip" data-flag="vita">✅ Vita ok</button>
          <button class="chip" data-flag="vita_warn">⚠️ Vita±</button>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Sort</div>
        <div class="chips">
          <button class="sort-btn active" data-sort="default">Default</button>
          <button class="sort-btn" data-sort="year-new">Newest</button>
          <button class="sort-btn" data-sort="year-old">Oldest</button>
          <button class="sort-btn" data-sort="az">A–Z</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-toolbar">
      <span style="font-family:var(--fm);font-size:10px;color:var(--t3)">Click any card to inspect</span>
      <div class="view-row">
        <button class="view-btn active" id="GVB" title="Grid">⊞</button>
        <button class="view-btn" id="LVB" title="List">≡</button>
      </div>
    </div>
    <div class="grid-scroll">
      <div class="grid" id="GRID"></div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail closed" id="DP">
    <div class="detail-wrap">
      <button class="detail-close" id="DPC">✕</button>
      <div id="DPC2"></div>
    </div>
  </div>

</div>

{t:"NBA 2K24",y:2023,g:"sports",vita:"warn",f:["couch","party","online"],d:"The basketball simulation. MyCareer, couch versus, and online leagues. Best pick-up sports game."},

const seen=new Set();
const G=GAMES.filter(g=>{if(seen.has(g.t))return false;seen.add(g.t);return true;});
document.getElementById('sTotal').textContent=G.length;
document.getElementById('sMust').textContent=G.filter(g=>g.f.includes('must')).length;
document.getElementById('sVita').textContent=G.filter(g=>g.vita==='yes').length;

let curG='all',curP='all',aF=new Set(),curS='default',listV=false;

function getImg(g){const u=IMG[g.t];return(u&&u.length>0)?u:null;}

function buildCard(g,i){
  const img=getImg(g);const isMust=g.f.includes('must');
  const c=document.createElement('div');
  c.className='card'+(isMust?' must':'');
  c.style.animationDelay=Math.min(i*.02,.4)+'s';
  const plat=g.p||'PC';const pi=PC_PLAT[plat]||PC_PLAT.PC;
  const ge=GE[g.g]||'🎮';
  const vc=g.vita==='yes'?'ct-vy':g.vita==='warn'?'ct-vw':'ct-vn';
  const vt=g.vita==='yes'?'Vita✓':g.vita==='warn'?'Vita±':'No Vita';
  const fd=[['must','ct-must','Must'],['couch','ct-couch','Couch'],['party','ct-party','Party'],
    ['coop','ct-coop','Co-op'],['online','ct-online','Online'],['solo','ct-solo','Solo'],
    ['owned','ct-owned','Owned'],['classic','ct-classic','Classic']];
  const ft=fd.filter(([k])=>g.f.includes(k)).map(([,cl,l])=>`<span class="ct ${cl}">${l}</span>`).join('');
  const imgH=img
    ?`<div class="ciw"><img src="${img}" alt="${g.t}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling&&(this.nextElementSibling.style.display='flex')"><div class="cip" style="display:none">${ge}</div><span class="yr">${g.y}</span><span class="pb" style="background:${pi.c}">${pi.l}</span></div>`
    :`<div class="ciw"><div class="cip">${ge}</div><span class="yr">${g.y}</span><span class="pb" style="background:${pi.c}">${pi.l}</span></div>`;
  c.innerHTML=`${imgH}<div class="cbody"><div class="ctitle">${g.t}</div><div class="cdesc">${g.d}</div><div class="ctags"><span class="ct ct-genre">${g.g}</span>${ft}<span class="ct ${vc}">${vt}</span></div></div>`;
  c.addEventListener('click',()=>openDetail(g));
  return c;
}

function getSorted(){
  const q=(document.getElementById('SI').value||'').toLowerCase();
  let list=G.filter(g=>{
    const mg=curG==='all'||g.g===curG;
    const mp=curP==='all'||(g.p||'PC')===curP;
    const ms=!q||g.t.toLowerCase().includes(q)||g.d.toLowerCase().includes(q)||g.g.toLowerCase().includes(q)||(g.p||'PC').toLowerCase().includes(q);
    let mf=true;
    if(aF.size>0){for(const fl of aF){if(fl==='vita'){if(g.vita!=='yes'){mf=false;break}}else if(fl==='vita_warn'){if(g.vita!=='warn'&&g.vita!=='yes'){mf=false;break}}else if(!g.f.includes(fl)){mf=false;break}}}
    return mg&&mp&&ms&&mf;
  });
  if(curS==='year-new')list.sort((a,b)=>b.y-a.y);
  else if(curS==='year-old')list.sort((a,b)=>a.y-b.y);
  else if(curS==='az')list.sort((a,b)=>a.t.localeCompare(b.t));
  else list.sort((a,b)=>(b.f.includes('must')?1:0)-(a.f.includes('must')?1:0));
  return list;
}

const FL={must:'Must Play',owned:'Owned',classic:'Classic',couch:'Couch',party:'Party',coop:'Co-op',online:'Online',solo:'Solo',vita:'Vita ok',vita_warn:'Vita limited'};
const GL={'open-world':'Open World',action:'Action',shooter:'Shooter',rpg:'RPG',coop:'Co-op',racing:'Racing',strategy:'Strategy',platformer:'Platformer',fighting:'Fighting',sports:'Sports'};
const PL={PC:'PC',PS1:'PS1',PS2:'PS2',PS3:'PS3',PSP:'PSP',VITA:'Vita',NDS:'DS',N3DS:'3DS',WII:'Wii',WIIU:'Wii U',NSW:'Switch'};

function renderATags(){
  const el=document.getElementById('AT');el.innerHTML='';
  const add=(label,rm)=>{const t=document.createElement('div');t.className='atag';t.innerHTML=`${label} <span class="x">✕</span>`;t.addEventListener('click',rm);el.appendChild(t);};
  if(curG!=='all')add(GL[curG]||curG,()=>{curG='all';document.querySelectorAll('#GF .chip').forEach(b=>b.classList.remove('active'));document.querySelector('#GF [data-genre="all"]').classList.add('active');render();});
  if(curP!=='all')add(PL[curP]||curP,()=>{curP='all';document.querySelectorAll('#PF .chip').forEach(b=>b.classList.remove('active'));document.querySelector('#PF [data-plat="all"]').classList.add('active');render();});
  aF.forEach(fl=>add(FL[fl]||fl,()=>{aF.delete(fl);document.querySelector(`#FF [data-flag="${fl}"]`)?.classList.remove('active');render();}));
}

function render(){
  const grid=document.getElementById('GRID');const list=getSorted();
  grid.innerHTML='';
  if(!list.length){grid.innerHTML='<div class="empty"><span>🔍</span>No games match.</div>';}
  else{list.forEach((g,i)=>grid.appendChild(buildCard(g,i)));}
  document.getElementById('sCount').textContent=list.length;
  renderATags();
}

  const plat=g.p||'PC';const pi=PC_PLAT[plat]||PC_PLAT.PC;
  const ge=GE[g.g]||'🎮';
  const vc=g.vita==='yes'?'ct-vy':g.vita==='warn'?'ct-vw':'ct-vn';
  const vt=g.vita==='yes'?'✅ Fully playable via Moonlight':g.vita==='warn'?'⚠️ Playable with limits (no LB/RB/L3/R3)':'❌ Not recommended (needs L2/R2/L3/R3)';
  const vbg=g.vita==='yes'?'rgba(104,211,145,.08)':g.vita==='warn'?'rgba(246,224,94,.06)':'rgba(252,129,129,.06)';
  const fd=[['must','ct-must','Must Play'],['couch','ct-couch','Couch Co-op'],['party','ct-party','Party'],['coop','ct-coop','Co-op'],['online','ct-online','Online'],['solo','ct-solo','Solo'],['owned','ct-owned','Owned'],['classic','ct-classic','Classic']];
  const ft=fd.filter(([k])=>g.f.includes(k)).map(([,cl,l])=>`<span class="ct ${cl}">${l}</span>`).join('');
  const imgH=img?`<img class="detail-img" src="${img}" alt="${g.t}" referrerpolicy="no-referrer" onerror="this.style.display='none'">`:`<div class="detail-img-ph">${ge}</div>`;
  document.getElementById('DPC2').innerHTML=`${imgH}<div class="detail-body"><div><div class="dtitle">${g.t}</div><div class="dmeta">${g.y} · ${g.g} · <span style="color:${pi.c}">${pi.l}</span></div></div><div class="ddesc">${g.d}</div><div class="dtags"><span class="ct ct-genre">${g.g}</span>${ft}</div><div class="dvita" style="background:${vbg}"><span class="ct ${vc}" style="background:none;border:none;padding:0">${vt}</span></div></div>`;
  dp.classList.remove('closed');
}

document.getElementById('DPC').addEventListener('click',()=>document.getElementById('DP').classList.add('closed'));
document.getElementById('SI').addEventListener('input',render);
document.querySelectorAll('#GF .chip').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#GF .chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');curG=b.dataset.genre;render();}));
document.querySelectorAll('#PF .chip').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#PF .chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');curP=b.dataset.plat;render();}));
document.querySelectorAll('#FF .chip').forEach(b=>b.addEventListener('click',()=>{const f=b.dataset.flag;if(aF.has(f)){aF.delete(f);b.classList.remove('active');}else{aF.add(f);b.classList.add('active');}render();}));
document.querySelectorAll('.sort-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.sort-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curS=b.dataset.sort;render();}));
document.getElementById('GVB').addEventListener('click',()=>{listV=false;document.getElementById('GRID').classList.remove('list-v');document.getElementById('GVB').classList.add('active');document.getElementById('LVB').classList.remove('active');});
document.getElementById('LVB').addEventListener('click',()=>{listV=true;document.getElementById('GRID').classList.add('list-v');document.getElementById('LVB').classList.add('active');document.getElementById('GVB').classList.remove('active');});
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('SI').focus();}if(e.key==='Escape')document.getElementById('DP').classList.add('closed');});
render();
</script>
</body>
</html>
